{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ book.title }} | Reader</title>

<script src="{% static 'pdfjs/pdf.min.js' %}"></script>

<style>
:root {
    --bg: #0f0f0f;
    --toolbar: #1c1c1c;
    --accent: #800000;
    --text: #f5f5f5;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
}

/* Toolbar */
#toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--toolbar);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.5);
}

#toolbar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

#toolbar button:hover {
    opacity: .9;
}

#page-info {
    margin-left: auto;
    font-size: 14px;
    opacity: .85;
}

/* Viewer */
#viewer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
}

/* Page */
canvas {
    background: white;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
    border-radius: 4px;
    max-width: 95%;
}

/* Mobile */
@media (max-width: 768px) {
    #toolbar {
        flex-wrap: wrap;
        gap: 8px;
    }
    #page-info {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<div id="toolbar">
    <button onclick="prevPage()">◀</button>
    <button onclick="nextPage()">▶</button>
    <button onclick="zoomOut()">−</button>
    <button onclick="zoomIn()">＋</button>

    <div id="page-info">
        Page <span id="page_num">1</span> / <span id="page_count">0</span>
    </div>
</div>

<div id="viewer">
    <canvas id="pdf-canvas"></canvas>
</div>

<script>
const url = "{% url 'stream_pdf' book.slug %}";

pdfjsLib.GlobalWorkerOptions.workerSrc =
    "{% static 'pdfjs/pdf.worker.min.js' %}";

let pdfDoc = null;
let pageNum = {{ last_page|default:1 }};
let scale = 1.3;

const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');

pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;
    document.getElementById('page_count').textContent = pdf.numPages;
    renderPage(pageNum);
});

function renderPage(num) {
    pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        page.render({ canvasContext: ctx, viewport });
        document.getElementById('page_num').textContent = num;
    });
}

function nextPage() {
    if (pageNum < pdfDoc.numPages) renderPage(++pageNum);
}
function prevPage() {
    if (pageNum > 1) renderPage(--pageNum);
}
function zoomIn() {
    scale += 0.15;
    renderPage(pageNum);
}
function zoomOut() {
    scale = Math.max(.6, scale - .15);
    renderPage(pageNum);
}

/* Keyboard shortcuts */
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') nextPage();
    if (e.key === 'ArrowLeft') prevPage();
    if (e.key === '+') zoomIn();
    if (e.key === '-') zoomOut();
});

function saveProgress() {
    fetch("{% url 'save_progress' book.slug %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            page: pageNum,
            total: pdfDoc.numPages
        })
    });
}

/* Save on page change */
const originalRender = renderPage;
renderPage = function(num) {
    originalRender(num);
    saveProgress();
};

/* Save when closing tab */
window.addEventListener("beforeunload", saveProgress);
</script>

</body>
</html>

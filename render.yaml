services:
  - type: web
    name: readloom
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn readloom.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: read-loom.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://read-loom.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: readloom-db
          property: connectionString

databases:
  - name: readloom-db
    plan: free
